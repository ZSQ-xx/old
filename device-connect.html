<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>设备蓝牙配对 - 养老云生活</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #0f172a; color: #ffffff; font-family: "Microsoft YaHei", sans-serif; }
        .high-contrast-card { background-color: #1e293b; border: 3px solid #334155; }
        .action-button { background-color: #facc15; color: #000000; transition: all 0.3s; }
        .action-button:hover { background-color: #fde047; transform: scale(1.05); }
        .device-card { transition: all 0.3s; cursor: pointer; }
        .device-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .searching { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="p-6">
<!-- 顶部导航 -->
<header class="flex items-center mb-8 pb-4 border-b-4 border-slate-700">
<button class="mr-6" onclick="window.location.href='device.html'">
<iconify-icon class="text-5xl text-blue-400" icon="mdi:arrow-left"></iconify-icon>
</button>
<h1 class="text-4xl font-bold tracking-wider">设备蓝牙配对</h1>
</header>

<main class="max-w-[1200px] mx-auto">
<!-- 搜索状态条 -->
<div class="high-contrast-card rounded-3xl p-6 mb-8 flex items-center justify-between">
<div class="flex items-center gap-4">
<iconify-icon class="text-4xl text-blue-400" icon="mdi:bluetooth-searching"></iconify-icon>
<div>
<h2 class="text-2xl font-bold searching">正在搜索附近智能设备...</h2>
<p class="text-xl text-slate-400">请确保设备已开启并处于配对模式</p>
</div>
</div>
<div class="w-16 h-16 border-8 border-t-blue-500 border-r-blue-500 border-b-transparent border-l-transparent rounded-full animate-spin"></div>
</div>

<!-- 设备列表 -->
<div class="space-y-6 mb-8">
<div class="device-card high-contrast-card rounded-3xl p-6 flex justify-between items-center" onclick="connectDevice('健康监测手环')">
<div class="flex items-center gap-4">
<iconify-icon class="text-5xl text-slate-300" icon="mdi:watch-variant"></iconify-icon>
<div>
<h3 class="text-3xl font-bold">健康监测手环</h3>
<p class="text-xl text-slate-400">型号：HB-100</p>
</div>
</div>
<span class="bg-slate-700 text-slate-400 px-4 py-2 rounded-full text-xl font-bold">未连接</span>
</div>

<div class="device-card high-contrast-card rounded-3xl p-6 flex justify-between items-center" onclick="connectDevice('全自动血压检测仪')">
<div class="flex items-center gap-4">
<iconify-icon class="text-5xl text-slate-300" icon="mdi:medical-bag"></iconify-icon>
<div>
<h3 class="text-3xl font-bold">全自动血压检测仪</h3>
<p class="text-xl text-slate-400">型号：BP-200</p>
</div>
</div>
<span class="bg-slate-700 text-slate-400 px-4 py-2 rounded-full text-xl font-bold">未连接</span>
</div>

<div class="device-card high-contrast-card rounded-3xl p-6 flex justify-between items-center" onclick="connectDevice('紧急呼叫按钮')">
<div class="flex items-center gap-4">
<iconify-icon class="text-5xl text-slate-300" icon="mdi:alert-decagram"></iconify-icon>
<div>
<h3 class="text-3xl font-bold">紧急呼叫按钮</h3>
<p class="text-xl text-slate-400">型号：EC-300</p>
</div>
</div>
<span class="bg-slate-700 text-slate-400 px-4 py-2 rounded-full text-xl font-bold">未连接</span>
</div>

<div class="device-card high-contrast-card rounded-3xl p-6 flex justify-between items-center" onclick="connectDevice('智能床垫感应器')">
<div class="flex items-center gap-4">
<iconify-icon class="text-5xl text-slate-300" icon="mdi:bed-empty"></iconify-icon>
<div>
<h3 class="text-3xl font-bold">智能床垫感应器</h3>
<p class="text-xl text-slate-400">型号：SM-400</p>
</div>
</div>
<span class="bg-slate-700 text-slate-400 px-4 py-2 rounded-full text-xl font-bold">未连接</span>
</div>
</div>

<!-- 底部操作 -->
<div class="flex flex-col md:flex-row gap-4">
<button class="action-button flex-1 py-4 rounded-xl text-2xl font-bold" onclick="refreshSearch()">
<iconify-icon class="inline-block mr-2" icon="mdi:refresh"></iconify-icon> 刷新搜索
</button>
<button class="bg-slate-700 flex-1 py-4 rounded-xl text-2xl font-bold" onclick="window.location.href='index.html'">
<iconify-icon class="inline-block mr-2" icon="mdi:home"></iconify-icon> 返回首页
</button>
</div>
</main>

<script>
        // 连接设备功能
        function connectDevice(deviceName) {
            // 显示配对中弹窗
            const pairingPopup = document.createElement('div');
            pairingPopup.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
            pairingPopup.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-3xl border-4 border-blue-500 max-w-md w-full">
                    <h3 class="text-3xl font-bold mb-6 text-center text-blue-300">正在与设备配对...</h3>
                    <p class="text-2xl text-center mb-6">${deviceName}</p>
                    <div class="flex justify-center">
                        <div class="w-20 h-20 border-8 border-t-blue-500 border-r-blue-500 border-b-transparent border-l-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(pairingPopup);

            // 模拟配对过程
            setTimeout(() => {
                pairingPopup.remove();
                
                // 显示配对成功弹窗
                const successPopup = document.createElement('div');
                successPopup.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
                successPopup.innerHTML = `
                    <div class="bg-slate-800 p-8 rounded-3xl border-4 border-green-500 max-w-md w-full">
                        <h3 class="text-3xl font-bold mb-6 text-center text-green-400">配对成功</h3>
                        <p class="text-2xl text-center mb-6">${deviceName}已成功连接</p>
                        <div class="flex justify-center mb-6">
                            <iconify-icon class="text-8xl text-green-400" icon="mdi:check-circle"></iconify-icon>
                        </div>
                    </div>
                `;
                document.body.appendChild(successPopup);

                // 延迟后跳转到首页
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }, 1500);
        }

        // 刷新搜索
        function refreshSearch() {
            alert('正在重新搜索设备...');
            // 这里可以添加重新搜索的逻辑
        }
    </script>
</body>
</html>
