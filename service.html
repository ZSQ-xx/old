<!-- 紧急求助 -->
<div class="bg-red-600 p-6 md:p-8 rounded-3xl flex items-center gap-4 md:gap-6 cursor-pointer hover:bg-red-500 transition-all" onclick="callCommunityHotline()">
<iconify-icon class="text-5xl md:text-6xl" icon="mdi:phone-alert"></iconify-icon>
<div>
<p class="text-2xl md:text-3xl font-black">社区直连热线</p>
<p class="text-lg md:text-xl">遇到困难按这里</p>
</div>
</div>

<script>
        // 社区直连热线
        function callCommunityHotline() {
            try {
                const popup = document.createElement('div');
                popup.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
                popup.innerHTML = `
                    <div class="bg-slate-800 p-8 rounded-3xl border-4 border-red-500 max-w-md w-full">
                        <h3 class="text-3xl font-bold mb-6 text-center text-red-400">社区直连热线</h3>
                        <div class="flex flex-col items-center gap-6">
                            <div class="w-32 h-32 rounded-full bg-red-900/50 flex items-center justify-center">
                                <iconify-icon class="text-6xl text-red-400" icon="mdi:phone-alert"></iconify-icon>
                            </div>
                            <p class="text-2xl text-center">正在拨打社区热线...</p>
                            <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                                <div class="bg-red-500 h-full w-0" id="call-progress"></div>
                            </div>
                            <p class="text-xl text-center mt-4">热线电话：12345678</p>
                            <button class="w-full bg-red-600 p-4 rounded-xl text-2xl font-bold hover:bg-red-500" onclick="this.parentElement.parentElement.parentElement.remove()">取消呼叫</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(popup);
                
                // 模拟通话连接过程
                const progressBar = document.getElementById('call-progress');
                if (!progressBar) {
                    throw new Error('无法找到进度条元素');
                }
                
                let width = 0;
                const interval = setInterval(() => {
                    if (width >= 100) {
                        clearInterval(interval);
                        const statusElement = document.querySelector('.text-2xl.text-center');
                        if (statusElement) {
                            statusElement.textContent = '通话中...';
                        }
                    } else {
                        width += 5;
                        progressBar.style.width = width + '%';
                    }
                }, 100);
            } catch (error) {
                console.error('拨打社区热线失败:', error);
                // 创建错误提示
                const errorPopup = document.createElement('div');
                errorPopup.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-8 py-4 rounded-xl text-2xl font-bold z-50';
                errorPopup.textContent = '拨打社区热线失败，请重试';
                document.body.appendChild(errorPopup);
                setTimeout(() => {
                    errorPopup.remove();
                }, 3000);
            }
        }
    </script>
