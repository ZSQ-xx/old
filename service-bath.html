<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>居家助浴服务 - 养老云生活</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #0f172a; color: #ffffff; font-family: "Microsoft YaHei", sans-serif; }
        .high-contrast-card { background-color: #1e293b; border: 3px solid #334155; }
        .action-button { background-color: #facc15; color: #000000; transition: all 0.3s; }
        .action-button:hover { background-color: #fde047; transform: scale(1.05); }
    </style>
</head>
<body class="p-6">
<!-- 顶部导航 -->
<header class="flex items-center mb-8 pb-4 border-b-4 border-slate-700">
<button class="mr-6" onclick="window.location.href='service.html'">
<iconify-icon class="text-5xl text-blue-400" icon="mdi:arrow-left"></iconify-icon>
</button>
<h1 class="text-4xl font-bold tracking-wider">居家助浴服务</h1>
</header>

<main class="max-w-[1200px] mx-auto">
<!-- 服务介绍 -->
<div class="high-contrast-card rounded-3xl p-8 mb-8">
<h2 class="text-3xl font-bold mb-6 text-teal-400">服务介绍</h2>
<p class="text-2xl leading-relaxed">居家助浴服务为老年人提供专业的居家洗浴护理，由经过专业培训的护理员上门服务，确保老年人在安全、舒适的环境中享受洗浴服务。</p>
</div>

<!-- 服务内容 -->
<div class="high-contrast-card rounded-3xl p-8 mb-8">
<h2 class="text-3xl font-bold mb-6 text-teal-400">服务内容</h2>
<ul class="space-y-4 text-2xl">
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:check-circle"></iconify-icon>
<span>全身洗浴护理</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:check-circle"></iconify-icon>
<span>头发清洗与护理</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:check-circle"></iconify-icon>
<span>身体护理（擦药、按摩等）</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:check-circle"></iconify-icon>
<span>洗浴环境准备与清洁</span>
</li>
</ul>
</div>

<!-- 服务流程 -->
<div class="high-contrast-card rounded-3xl p-8 mb-8">
<h2 class="text-3xl font-bold mb-6 text-teal-400">服务流程</h2>
<ol class="space-y-4 text-2xl">
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:numeric-1-circle"></iconify-icon>
<span>预约确认：确认服务时间和具体需求</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:numeric-2-circle"></iconify-icon>
<span>上门准备：护理员携带专业设备上门</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:numeric-3-circle"></iconify-icon>
<span>环境准备：准备洗浴环境，确保安全</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:numeric-4-circle"></iconify-icon>
<span>助浴服务：专业护理员提供洗浴护理</span>
</li>
<li class="flex items-center gap-4">
<iconify-icon class="text-3xl text-teal-400" icon="mdi:numeric-5-circle"></iconify-icon>
<span>整理清洁：整理洗浴环境，清理设备</span>
</li>
</ol>
</div>

<!-- 预约表单 -->
<div class="high-contrast-card rounded-3xl p-8 mb-8">
<h2 class="text-3xl font-bold mb-6 text-teal-400">预约服务</h2>
<div class="space-y-6">
<div class="flex flex-col md:flex-row gap-4">
<div class="flex-1">
<label class="block text-2xl mb-4">预约日期</label>
<input type="date" class="bg-slate-800 text-2xl px-4 py-3 rounded-xl w-full">
</div>
<div class="flex-1">
<label class="block text-2xl mb-4">服务时间</label>
<input type="time" class="bg-slate-800 text-2xl px-4 py-3 rounded-xl w-full">
</div>
</div>
<div>
<label class="block text-2xl mb-4">服务类型</label>
<select class="bg-slate-800 text-2xl px-4 py-3 rounded-xl w-full">
<option>全身助浴</option>
<option>头发清洗</option>
<option>身体护理</option>
</select>
</div>
<div>
<label class="block text-2xl mb-4">健康状况</label>
<textarea class="bg-slate-800 text-2xl px-4 py-3 rounded-xl w-full" rows="4" placeholder="请输入老人的健康状况，如是否有高血压、心脏病等"></textarea>
</div>
<div class="flex gap-4">
<button class="action-button flex-1 py-4 rounded-xl text-2xl font-bold" onclick="bookService()">确认预约</button>
<button class="bg-slate-700 flex-1 py-4 rounded-xl text-2xl font-bold" onclick="window.location.href='service.html'">取消</button>
</div>
</div>
</div>
</main>

<script>
        function bookService() {
            alert('预约成功！护理员将在预约时间上门为您提供服务。');
            window.location.href='service.html';
        }
    </script>
</body>
</html>
